publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  http: ^1.6.0
  pin_code_fields: ^9.1.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  signalr_netcore: ^1.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
